name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Main test job (named "test" to satisfy GitHub's expected status check)
  test:
    name: test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check package exports
        run: npm run check:package

      - name: Run checks (typecheck + tests)
        run: npm run check

  postgres-storage:
    name: PostgreSQL storage
    timeout-minutes: 5
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Run real PostgreSQL adapter tests
        run: npm test -- --run __tests__/storage/postgres/integration.test.ts
        env:
          RUN_POSTGRES_INTEGRATION: '1'
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'

  # Check code formatting (fast, runs in parallel)
  format:
    name: Format Check
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .
